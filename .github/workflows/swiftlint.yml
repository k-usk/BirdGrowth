name: SwiftLint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  SwiftLint:
    # GitHubが提供する最新のMac環境を使用（標準でSwiftLintがインストールされています）
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        # 外部Actionを使わず、システム標準のswiftlintコマンドを直接実行して高速化
        # --strict: 規約違反をエラー扱いにしてビルドを失敗させ、商用品質を担保
        # --reporter github-actions-logging: GitHubのアクション画面にエラー箇所を直接表示
        run: swiftlint lint --strict --reporter github-actions-logging
