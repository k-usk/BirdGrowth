name: SwiftLint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Node.js 20の非推奨警告を解消し、将来の標準となる24系で動作させるための設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  SwiftLint:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Homebrewを高速化するためのキャッシュ設定（キャッシュキーをv2に更新）
      - name: Cache SwiftLint
        id: cache-swiftlint
        uses: actions/cache@v4
        with:
          # Appleシリコン上のHomebrewバイナリのパスを指定
          path: /opt/homebrew/bin/swiftlint
          key: ${{ runner.os }}-swiftlint-v2

      # キャッシュがない場合のみインストール
      - name: Install SwiftLint
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        run: brew install swiftlint

      - name: Run SwiftLint
        # フルパスを指定することで実行を確実にする
        # --strict: 違反をエラー扱いにしてマージをブロックする（商用品質維持）
        # --reporter github-actions-logging: PR画面に直接注釈を表示する
        run: /opt/homebrew/bin/swiftlint lint --strict --reporter github-actions-logging