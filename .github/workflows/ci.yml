name: CI (Lint & Test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Node.js 20の非推奨警告を解消し、将来の標準となる24系で動作させるための設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        # --strict: 違反をエラー扱いにしてマージをブロックする
        # --reporter github-actions-logging: PR画面に直接注釈を表示する
        run: swiftlint lint --strict --reporter github-actions-logging

  test:
    name: Unit Tests
    # macOS 14 (Sonoma) を使用して安定性を確保
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode 16
        run: |
          XCODE_PATH=$(ls /Applications | grep "Xcode_16" | head -n 1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "/Applications/$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Run Tests
        # iPhone 15 シミュレータを使用
        run: |
          xcodebuild test \
            -project BirdGrowth.xcodeproj \
            -scheme BirdGrowth \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -resultBundlePath TestResults.xcresult
