name: CI (Lint & Test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Node.js 20の非推奨警告を解消し、将来の標準となる24系で動作させるための設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        # --strict: 違反をエラー扱いにしてマージをブロックする
        # --reporter github-actions-logging: PR画面に直接注釈を表示する
        run: swiftlint lint --strict --reporter github-actions-logging

  test:
    name: Unit Tests
    # macOS 15 (Sequoia) を明示的に指定
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        # Swift Testing が動作する Xcode 16.2 を明示的に選択
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run Tests
        # iPhone 16 シミュレータを使用
        run: |
          xcodebuild test \
            -project BirdGrowth.xcodeproj \
            -scheme BirdGrowth \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult
