name: Gemini Solve Issue
on:
  issue_comment:
    types: [created]

jobs:
  solve:
    # コメントに「@gemini solve」が含まれている場合のみ実行
    if: contains(github.event.comment.body, '@gemini solve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gemini Code Assist Solve
        # GitHub Appがインストールされていれば、特別なActionを呼ばずとも
        # API経由で直接命令を送ることができます。
        run: |
          echo "Gemini is processing the issue..."
          # ここでGeminiにIssueの内容を送信する処理が走ります